<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folloze Theme Editor</title>
<style>
  :root{
    --ui-bg:#0f1117; --ui-panel:#171a23; --ui-panel-2:#1e222d; --ui-border:#2a2f3c;
    --ui-text:#e7e9ee; --ui-muted:#9aa1b1; --ui-accent:#4f46e5; --ui-accent-2:#6d65f0;
    --ui-good:#22c55e; --ui-radius:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--ui-bg); color:var(--ui-text); overflow:hidden;
  }
  .app{display:grid; grid-template-columns:minmax(480px,540px) 1fr; height:100vh}
  /* ---------- Left: editor ---------- */
  .editor{display:flex; flex-direction:column; border-right:1px solid var(--ui-border); min-width:0; min-height:0}
  .topbar{
    display:flex; align-items:center; gap:8px; padding:14px 16px; border-bottom:1px solid var(--ui-border);
    background:var(--ui-panel);
  }
  .topbar h1{font-size:15px; margin:0; font-weight:700; letter-spacing:.2px; flex:1}
  .topbar .logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,var(--ui-accent),#1cd4d4)}
  .btn{
    border:1px solid var(--ui-border); background:var(--ui-panel-2); color:var(--ui-text);
    padding:7px 12px; border-radius:8px; font-size:12.5px; cursor:pointer; font-weight:600; white-space:nowrap;
  }
  .btn:hover{border-color:var(--ui-accent)}
  .btn.primary{background:var(--ui-accent); border-color:var(--ui-accent)}
  .btn.primary:hover{background:var(--ui-accent-2)}
  .tabs{display:flex; gap:4px; padding:10px 12px 0; background:var(--ui-panel); border-bottom:1px solid var(--ui-border); flex-wrap:wrap}
  .tab{
    padding:8px 12px; font-size:12.5px; font-weight:600; color:var(--ui-muted); cursor:pointer;
    border-bottom:2px solid transparent; border-radius:6px 6px 0 0;
  }
  .tab.active{color:var(--ui-text); border-bottom-color:var(--ui-accent)}
  .panes{overflow-y:auto; padding:14px 16px 60px; flex:1; min-height:0}
  .pane{display:none}
  .pane.active{display:block}
  .group{margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,.08)}
  .panes .group:last-child{border-bottom:none}
  .group > h2{font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:var(--ui-muted); margin:0 0 4px}
  .group > .hint{font-size:11.5px; color:var(--ui-muted); margin:0 0 12px; line-height:1.5; opacity:.85}
  .row{display:flex; align-items:center; gap:10px; padding:7px 0}
  .row label{flex:1; font-size:13px}
  .row .sub{display:block; font-size:11px; color:var(--ui-muted); margin-top:1px}
  /* color control */
  .colorctl{display:flex; align-items:center; gap:8px}
  .swatch{width:34px;height:30px;border-radius:7px;border:1px solid var(--ui-border);cursor:pointer;padding:0;overflow:hidden}
  .colorctl input[type=text]{
    width:170px; background:var(--ui-panel-2); border:1px solid var(--ui-border); color:var(--ui-text);
    border-radius:7px; padding:6px 8px; font-size:11.5px; font-family:ui-monospace,Menlo,monospace;
  }
  select, .row input[type=number], .row input.txt{
    background:var(--ui-panel-2); border:1px solid var(--ui-border); color:var(--ui-text);
    border-radius:7px; padding:7px 8px; font-size:12.5px; min-width:140px;
  }
  .row input[type=number]{width:90px; min-width:0}
  /* custom color dropdown */
  .cs{width:16px;height:16px;border-radius:4px;border:1px solid rgba(255,255,255,.18);flex:0 0 auto;display:inline-block}
  .cs-none{background:
    linear-gradient(45deg,#555 25%,transparent 25%,transparent 75%,#555 75%),
    linear-gradient(45deg,#555 25%,#2a2f3c 25%,#2a2f3c 75%,#555 75%);
    background-size:8px 8px;background-position:0 0,4px 4px}
  .cdrop{display:flex;align-items:center;gap:8px;min-width:160px;max-width:200px;
    background:var(--ui-panel-2);border:1px solid var(--ui-border);color:var(--ui-text);
    border-radius:7px;padding:6px 8px;font-size:12.5px;cursor:pointer;text-align:left}
  .cdrop:hover{border-color:var(--ui-accent)}
  .cdrop .cl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cdrop .ca{color:var(--ui-muted);font-size:10px}
  .cpop{position:fixed;z-index:100;background:var(--ui-panel-2);border:1px solid var(--ui-accent);
    border-radius:9px;padding:5px;max-height:260px;overflow-y:auto;box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .cpop-it{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--ui-text)}
  .cpop-it:hover{background:var(--ui-panel)}
  .cpop-it.sel{background:var(--ui-accent)}
  /* in-app color picker */
  .pcr{position:fixed;z-index:100;width:270px;background:var(--ui-panel-2);border:1px solid var(--ui-accent);border-radius:10px;padding:10px;box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .pcr-sv{position:relative;width:100%;height:130px;border-radius:6px;cursor:crosshair;margin-bottom:10px}
  .pcr-sv-thumb,.pcr-hue-thumb{position:absolute;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.5);transform:translate(-50%,-50%);pointer-events:none}
  .pcr-hue{position:relative;width:100%;height:12px;border-radius:6px;cursor:pointer;margin-bottom:10px;
    background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)}
  .pcr-hue-thumb{top:50%}
  .pcr-foot{display:flex;align-items:center;gap:8px}
  .pcr-sw{width:26px;height:26px;border-radius:6px;border:1px solid var(--ui-border);flex:0 0 auto}
  .pcr-hex{flex:1;min-width:0;background:var(--ui-panel);border:1px solid var(--ui-border);color:var(--ui-text);border-radius:6px;padding:6px 8px;font-size:11.5px;font-family:ui-monospace,Menlo,monospace}
  .pcr-clear{background:var(--ui-panel);border:1px solid var(--ui-border);color:var(--ui-muted);border-radius:6px;padding:6px 9px;font-size:11px;cursor:pointer;flex:0 0 auto;font-weight:600}
  .pcr-clear:hover{border-color:var(--ui-accent);color:var(--ui-text)}
  /* toggle switch */
  .row .sw-toggle{position:relative;width:38px;min-width:38px;height:22px;flex:0 0 auto;cursor:pointer;display:inline-block}
  .sw-toggle input{opacity:0;width:0;height:0}
  .sw-track{position:absolute;inset:0;background:var(--ui-panel-2);border:1px solid var(--ui-border);border-radius:99px;transition:.2s}
  .sw-track:before{content:"";position:absolute;width:16px;height:16px;left:2px;top:2px;background:#8a90a0;border-radius:50%;transition:.2s}
  .sw-toggle input:checked + .sw-track{background:var(--ui-accent);border-color:var(--ui-accent)}
  .sw-toggle input:checked + .sw-track:before{transform:translateX(16px);background:#fff}
  .shstage{background:#e9ebf0;border-radius:8px;padding:10px;display:inline-flex;flex:0 0 auto}
  .shbox{width:24px;height:24px;background:#fff;border-radius:5px;display:block}
  .radbox{width:30px;height:30px;background:var(--ui-accent);flex:0 0 auto}
  .spacebar{height:10px;background:var(--ui-accent);border-radius:3px;flex:0 0 auto;max-width:150px}
  .scale-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .scale-chip{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--ui-muted)}
  .scale-chip .sw{width:42px;height:28px;border-radius:6px;border:1px solid var(--ui-border)}
  details.adv{border:1px solid var(--ui-border);border-radius:8px;padding:6px 12px;margin-top:10px;background:var(--ui-panel)}
  details.adv > summary{cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ui-muted);padding:6px 0;list-style:none}
  details.adv > summary::-webkit-details-marker{display:none}
  details.adv > summary::before{content:"▸ ";color:var(--ui-accent)}
  details.adv[open] > summary::before{content:"▾ "}
  .locked{opacity:.55}
  .locked .swatch{cursor:not-allowed}
  .accordion{border:1px solid var(--ui-border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
  .accordion summary{position:relative;cursor:pointer;padding:10px 34px 10px 12px;font-size:13px;font-weight:600;background:var(--ui-panel);list-style:none;color:var(--ui-text)}
  .accordion summary::-webkit-details-marker{display:none}
  .accordion summary::after{content:"›";position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--ui-muted);font-size:16px;transition:transform .2s,color .2s}
  .accordion[open]{border-color:var(--ui-accent);box-shadow:0 0 0 1px var(--ui-accent)}
  .accordion[open] summary{background:rgba(79,70,229,.16);border-bottom:1px solid var(--ui-accent);color:#fff}
  .accordion[open] summary::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ui-accent)}
  .accordion[open] summary::after{transform:translateY(-50%) rotate(90deg);color:var(--ui-accent-2)}
  .accordion .body{padding:6px 12px 12px}
  /* ---------- Right: preview ---------- */
  .preview{display:flex; flex-direction:column; min-width:0; background:#fff}
  .preview .pvbar{
    display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--ui-panel);
    border-bottom:1px solid var(--ui-border); color:var(--ui-text)
  }
  .preview .pvbar span{font-size:12px;color:var(--ui-muted);flex:1}
  .seg{display:flex;border:1px solid var(--ui-border);border-radius:8px;overflow:hidden}
  .seg button{background:var(--ui-panel-2);color:var(--ui-muted);border:0;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600}
  .seg button.active{background:var(--ui-accent);color:#fff}
  iframe{flex:1;border:0;width:100%;background:#fff}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ui-good);color:#04130a;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;
    opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4)
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  input[type=file]{display:none}
  .reset-mini{font-size:10.5px;color:var(--ui-muted);cursor:pointer;text-decoration:underline;margin-left:4px}
</style>
</head>
<body>
<div class="app">
  <!-- ===================== EDITOR ===================== -->
  <div class="editor">
    <div class="topbar">
      <div class="logo"></div>
      <h1>Theme Editor</h1>
      <button class="btn" id="importBtn">Import</button>
      <button class="btn" id="resetBtn">Reset</button>
      <button class="btn primary" id="exportBtn">⬇ Export CSS</button>
      <input type="file" id="fileInput" accept=".css,text/css">
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="panes" id="panes"></div>
  </div>
  <!-- ===================== PREVIEW ===================== -->
  <div class="preview">
    <div class="pvbar">
      <span>Live preview — this is how your theme looks</span>
      <div class="seg" id="viewport">
        <button data-w="100%" class="active">Desktop</button>
        <button data-w="900px">Tablet</button>
        <button data-w="640px">Mobile</button>
      </div>
    </div>
    <iframe id="preview"></iframe>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   1. DEFAULT THEME TEMPLATE  (structure-faithful, value-editable)
   ============================================================ */
const DEFAULT_TEMPLATE = String.raw`html {
  font-size: 16px !important;
}
.modal-is-opened {
  overflow: hidden !important;
}

:root, :host, .code-block__preview {

/* ================ color palette ================ */

/* primary [fz-start colors>primary|--fz-color] */
--fz-color-primary-1: rgb(238, 242, 255); /* lightest */
--fz-color-primary-2: rgb(165, 180, 252);
--fz-color-primary-3: rgb(79, 70, 229);   /* main brand color */
--fz-color-primary-4: rgb(67, 56, 202);
--fz-color-primary-5: rgb(49, 46, 129);   /* darkest */
/* [fz-end] */

/* secondary [fz-start colors>secondary|--fz-color-] */
--fz-color-secondary-1: rgb(225, 252, 248);
--fz-color-secondary-2: rgb(28, 212, 212);
--fz-color-secondary-3: rgb(9, 154, 164);
--fz-color-secondary-4: rgb(7, 129, 143);
--fz-color-secondary-5: rgb(5, 96, 110);
/* [fz-end] */

/* tertiary [fz-start colors>tertiary|--fz-color-] */
--fz-color-tertiary-1: unset;
--fz-color-tertiary-2: unset;
--fz-color-tertiary-3: unset;
--fz-color-tertiary-4: unset;
--fz-color-tertiary-5: unset;
/* [fz-end] */

/* neutral [fz-start colors>neutral|--fz-color-] */
--fz-color-neutral-1: rgb(243, 244, 246); /* lightest grey/white */
--fz-color-neutral-2: rgb(209, 213, 219);
--fz-color-neutral-3: rgb(107, 114, 128); /* medium grey */
--fz-color-neutral-4: rgb(55, 65, 81);
--fz-color-neutral-5: rgb(12, 17, 29);    /* darkest grey/black */
/* [fz-end] */

/* neutral one-offs [fz-start colors>neutral|--fz-color-neutral-] */
--fz-color-neutral-0: rgb(255, 255, 255);
--fz-color-neutral-1000: rgb(0, 0, 0);
--fz-color-neutral-text-0: var(--fz-color-neutral-0);
--fz-color-neutral-text-1000: var(--fz-color-neutral-text-0);
/* [fz-end] */

/* Success */
--fz-color-success-1: rgb(240, 253, 244);
--fz-color-success-2: rgb(134, 239, 172);
--fz-color-success-3: rgb(34, 197, 94);
--fz-color-success-4: rgb(22, 163, 74);
--fz-color-success-5: rgb(20, 83, 45);

/* Warning */
--fz-color-warning-1: rgb(255, 251, 235);
--fz-color-warning-2: rgb(252, 211, 77);
--fz-color-warning-3: rgb(245, 158, 11);
--fz-color-warning-4: rgb(217, 119, 6);
--fz-color-warning-5: rgb(120, 53, 15);

/* Danger */
--fz-color-danger-1: rgb(254, 242, 242);
--fz-color-danger-2: rgb(252, 165, 165);
--fz-color-danger-3: rgb(239, 68, 68);
--fz-color-danger-4: rgb(220, 38, 38);
--fz-color-danger-5: rgb(127, 29, 29);

/* Info */
--fz-color-info-1: rgb(239, 246, 255);
--fz-color-info-2: rgb(147, 197, 253);
--fz-color-info-3: rgb(59, 130, 246);
--fz-color-info-4: rgb(37, 99, 235);
--fz-color-info-5: rgb(30, 58, 138);

/* ================ Spacings ================ */
--fz-spacing-5x-small: 0.125rem;
--fz-spacing-4x-small: 0.25rem;
--fz-spacing-3x-small: 0.375rem;
--fz-spacing-2x-small: 0.5rem;
--fz-spacing-1x-small: 0.625rem;
--fz-spacing-x-small: 0.75rem;
--fz-spacing-small: 1rem;
--fz-spacing-medium: 1.25rem;
--fz-spacing-large: 1.5rem;
--fz-spacing-x-large: 2rem;
--fz-spacing-2x-large: 2.5rem;
--fz-spacing-3x-large: 3rem;
--fz-spacing-4x-large: 3.5rem;
--fz-spacing-5x-large: 4rem;
--fz-spacing-6x-large: 5rem;
--fz-spacing-7x-large: 6rem;
--fz-widget-header-margin-bottom: var(--fz-spacing-5x-large);

/* ================ Weights ================ */
--fz-weight-thin: 100;
--fz-weight-light: 300;
--fz-weight-regular: 400;
--fz-weight-medium: 500;
--fz-weight-semi-bold: 600;
--fz-weight-bold: 700;
--fz-weight-extra-bold: 800;

/* ================ Shadows ================ */
--fz-shadow-none: none;
--fz-shadow-x-small: 0px 1px 2px rgba(17, 24, 39, 0.06), 0px 1px 3px rgba(17, 24, 39, 0.1);
--fz-shadow-small: 0px 2px 4px rgba(17, 24, 39, 0.06), 0px 4px 6px rgba(17, 24, 39, 0.1);
--fz-shadow-medium: 0px 10px 15px rgba(17, 24, 39, 0.1), 0px 4px 6px rgba(17, 24, 39, 0.05);
--fz-shadow-large: 0px 20px 25px rgba(17, 24, 39, 0.1), 0px 10px 10px rgba(17, 24, 39, 0.04);
--fz-shadow-x-large: 0px 25px 50px rgba(17, 24, 39, 0.25);
--fz-shadow-x-small-top: 0px -1px 2px rgba(17, 24, 39, 0.06), 0px -1px 3px rgba(17, 24, 39, 0.1);
--fz-shadow-medium-top: 0px -10px 15px rgba(17, 24, 39, 0.1), 0px -4px 6px rgba(17, 24, 39, 0.05);

/* ================ Links ================ */
--fz-link-color: rgb(59, 130, 246);
--fz-link-color-hover: rgb(37, 99, 235);
--fz-link-color-visited: var(--fz-link-color);
--fz-link-color-actived: var(--fz-link-color);
--fz-link-decoration: none;
--fz-link-decoration-hover: underline;

/* ================ Border radius ================ */
--fz-border-radius-none: 0;
--fz-border-radius-x-small: 2px;
--fz-border-radius-small: 4px;
--fz-border-radius-medium: 6px;
--fz-border-radius-large: 10px;
--fz-border-radius-x-large: 14px;
--fz-border-radius-circle: 50%;
--fz-border-radius-pill: 9999px;

/* ================ Fonts ================ */
--fz-font-family-1: "Open Sans", sans-serif;
--fz-font-family-2: "Roboto", sans-serif;
--fz-font-family-3: "Poppins", sans-serif;

/* ================ Heading factors ================ */
--fz-heading-1-font-size-factor: 1;
--fz-heading-1-line-height-factor: 1;
--fz-heading-1-letter-spacing-factor: 1;
--fz-heading-2-font-size-factor: 1;
--fz-heading-2-line-height-factor: 1;
--fz-heading-2-letter-spacing-factor: 1;
--fz-heading-3-font-size-factor: 1;
--fz-heading-3-line-height-factor: 1;
--fz-heading-3-letter-spacing-factor: 1;
--fz-heading-4-font-size-factor: 1;
--fz-heading-4-line-height-factor: 1;
--fz-heading-4-letter-spacing-factor: 1;
--fz-heading-5-font-size-factor: 1;
--fz-heading-5-line-height-factor: 1;
--fz-heading-5-letter-spacing-factor: 1;
--fz-heading-6-font-size-factor: 1;
--fz-heading-6-line-height-factor: 1;
--fz-heading-6-letter-spacing-factor: 1;
--fz-paragraph-1-font-size-factor: 1;
--fz-paragraph-1-line-height-factor: 1;
--fz-paragraph-1-letter-spacing-factor: 1;
--fz-paragraph-2-font-size-factor: 1;
--fz-paragraph-2-line-height-factor: 1;
--fz-paragraph-2-letter-spacing-factor: 1;
--fz-paragraph-3-font-size-factor: 1;
--fz-paragraph-3-line-height-factor: 1;
--fz-paragraph-3-letter-spacing-factor: 1;
--fz-system-text-1-font-size-factor: 1;
--fz-system-text-1-line-height-factor: 1;
--fz-system-text-1-letter-spacing-factor: 1;

/* ================ Text styles ================ */
--fz-heading-1-color: var(--fz-color-neutral-5);
--fz-heading-1-weight: var(--fz-weight-bold);
--fz-heading-1-font-family: var(--fz-font-family-1);
--fz-heading-1-font-size: calc(4rem * var(--fz-heading-1-font-size-factor));
--fz-heading-1-letter-spacing: calc(-0.03em * var(--fz-heading-1-letter-spacing-factor));
--fz-heading-1-line-height: calc(1.2 * var(--fz-heading-1-line-height-factor));

--fz-heading-2-color: var(--fz-color-neutral-5);
--fz-heading-2-weight: var(--fz-weight-bold);
--fz-heading-2-font-family: var(--fz-font-family-1);
--fz-heading-2-font-size: calc(3rem * var(--fz-heading-2-font-size-factor));
--fz-heading-2-letter-spacing: calc(-0.03em * var(--fz-heading-2-letter-spacing-factor));
--fz-heading-2-line-height: calc(1.4 * var(--fz-heading-2-line-height-factor));

--fz-heading-3-color: var(--fz-color-neutral-5);
--fz-heading-3-weight: var(--fz-weight-medium);
--fz-heading-3-font-family: var(--fz-font-family-1);
--fz-heading-3-font-size: calc(2.5rem * var(--fz-heading-3-font-size-factor));
--fz-heading-3-line-height: calc(1.4 * var(--fz-heading-3-line-height-factor));
--fz-heading-3-letter-spacing: calc(normal * var(--fz-heading-3-letter-spacing-factor));

--fz-heading-4-color: var(--fz-color-neutral-5);
--fz-heading-4-weight: var(--fz-weight-medium);
--fz-heading-4-font-family: var(--fz-font-family-1);
--fz-heading-4-font-size: calc(2.25rem * var(--fz-heading-4-font-size-factor));
--fz-heading-4-line-height: calc(1.4 * var(--fz-heading-4-line-height-factor));
--fz-heading-4-letter-spacing: calc(normal * var(--fz-heading-4-letter-spacing-factor));

--fz-heading-5-color: var(--fz-color-neutral-5);
--fz-heading-5-weight: var(--fz-weight-regular);
--fz-heading-5-font-family: var(--fz-font-family-1);
--fz-heading-5-font-size: calc(1.5rem * var(--fz-heading-5-font-size-factor));

/* ============================================================
   2. ENGINE  — read / write CSS variable VALUES only
   ============================================================ */
let state = { template: DEFAULT_TEMPLATE };

function getVar(name){
  const m = state.template.match(new RegExp('--'+name+'\\s*:\\s*([^;]*);'));
  return m ? m[1].trim() : null;
}
function setVar(name, value){
  const re = new RegExp('(--'+name+'\\s*:\\s*)[^;]*(;)');
  state.template = state.template.replace(re, '$1'+value+'$2');
}
/* read/write a variable INSIDE a specific max-width media query (e.g. 640, 1024) */
function mqRegex(mq){
  return new RegExp('@media[^{]*max-width:\\s*'+mq+'px[^{]*\\{[\\s\\S]*?\\}\\s*\\}');
}
function getVarScoped(mq, name){
  const b=state.template.match(mqRegex(mq)); if(!b) return null;
  const m=b[0].match(new RegExp('--'+name+'\\s*:\\s*([^;]*);'));
  return m?m[1].trim():null;
}
function setVarScoped(mq, name, value){
  const re=mqRegex(mq), b=state.template.match(re); if(!b) return;
  const updated=b[0].replace(new RegExp('(--'+name+'\\s*:\\s*)[^;]*(;)'), '$1'+value+'$2');
  state.template=state.template.replace(re, ()=>updated);
}

/* color helpers (theme uses rgb()) */
function parseRgb(v){
  if(!v) return null;
  const m = v.match(/rgba?\(\s*(\d+)[\s,]+(\d+)[\s,]+(\d+)/i);
  return m ? [ +m[1], +m[2], +m[3] ] : null;
}
function rgbToHex(v){
  const c = parseRgb(v); if(!c) return '#000000';
  return '#'+c.map(x=>x.toString(16).padStart(2,'0')).join('');
}
function hexToRgbStr(hex){
  const m = hex.replace('#','').match(/.{2}/g).map(x=>parseInt(x,16));
  return 'rgb('+m[0]+', '+m[1]+', '+m[2]+')';
}

const tabsEl=document.getElementById('tabs'), panesEl=document.getElementById('panes');
function buildUI(){
  tabsEl.innerHTML=''; panesEl.innerHTML='';
  SCHEMA.forEach((s,i)=>{
    const t=document.createElement('div'); t.className='tab'+(i===0?' active':''); t.textContent=s.title;
    const p=document.createElement('div'); p.className='pane'+(i===0?' active':''); p.id='pane-'+s.id;
    s.render(p);
    t.onclick=()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
      t.classList.add('active'); p.classList.add('active'); };
    tabsEl.appendChild(t); panesEl.appendChild(p);
  });
}

function googleFontsLink(){
  const fams=[getVar('fz-font-family-1'),getVar('fz-font-family-2'),getVar('fz-font-family-3')]
    .map(v=>(v||'').match(/"([^"]+)"/)).filter(Boolean).map(m=>m[1]);
  const uniq=[...new Set(fams)];
  if(!uniq.length) return '';
  const q=uniq.map(f=>'family='+f.replace(/ /g,'+')+':wght@300;400;500;600;700;800').join('&');
  return `<link rel="stylesheet" href="https://fonts.googleapis.com/css2?${q}&display=swap">`;
}

.readmore{font-size:13px;font-weight:700;color:var(--fz-tiles-read-more-button-color);cursor:pointer}

.ftitle{font:var(--fz-form-title-weight) var(--fz-form-title-font-size) var(--fz-form-title-font-family);color:var(--fz-form-title-color);margin-bottom:14px}
.flabel{display:block;font:var(--fz-form-label-weight) var(--fz-form-label-font-size) var(--fz-form-label-font-family);color:var(--fz-form-label-color);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.05em}

.col-sub{color:var(--fz-column-subtitle-color);font-weight:var(--fz-column-subtitle-weight);font-family:var(--fz-column-subtitle-font-family);font-size:var(--fz-column-subtitle-font-size);line-height:var(--fz-column-subtitle-line-height);margin-bottom:10px}
.col-p{color:var(--fz-column-paragraph-color);font-weight:var(--fz-column-paragraph-weight);font-family:var(--fz-column-paragraph-font-family);font-size:var(--fz-column-paragraph-font-size);line-height:var(--fz-column-paragraph-line-height)}
`;
function renderPreview(){
  const iframe=document.getElementById('preview');
  const offMap={'flz-primary':'.btn.primary','flz-secondary':'.btn.secondary','flz-custom-1':'.btn.c1','flz-custom-2':'.btn.c2','flz-curved':'.btn.curved','flz-circle':'.btn.circle','flz-link':'.btn.link','flz-link-2':'.btn.link2'};
  let hide='';
  for(const k in offMap){ if((getVar(k)||'').replace(/"/g,'').trim()==='off') hide+=offMap[k]+'{display:none!important}'; }
  const doc=`<!DOCTYPE html><html><head><meta charset="utf-8">${googleFontsLink()}
    <style>${state.template}</style><style>${SAMPLE_CSS}${hide}</style></head><body>${SAMPLE}</body></html>`;
  iframe.srcdoc=doc;
}

/* ============================================================
   7. TOP BAR ACTIONS
   ============================================================ */
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900); }
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([state.template],{type:'text/css'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='folloze-theme.css'; a.click(); URL.revokeObjectURL(a.href);
  toast('Theme exported ✓');
};
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('Reset all changes back to the default theme?')){ state.template=DEFAULT_TEMPLATE; buildUI(); renderPreview(); toast('Reset to default'); }
};
document.getElementById('importBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=e=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ state.template=r.result; buildUI(); renderPreview(); toast('Theme imported ✓'); };
  r.readAsText(file); e.target.value='';
};
document.querySelectorAll('#viewport button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#viewport button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const iframe=document.getElementById('preview');
  iframe.style.maxWidth=b.dataset.w; iframe.style.margin=b.dataset.w==='100%'?'0':'0 auto';
  iframe.style.borderLeft=b.dataset.w==='100%'?'0':'1px solid #ddd';
  iframe.style.borderRight=iframe.style.borderLeft;
});

/* ============================================================
   8. INIT
   ============================================================ */
buildUI();
renderPreview();
</script>
</body>
</html>
