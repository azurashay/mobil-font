<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folloze · Mobile typography tuner</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0c111d; --ink-2:#374151; --ink-3:#6b7280; --ink-4:#9ca3af;
    --line:#e8e9ee; --line-2:#f3f4f6; --surface:#ffffff; --canvas:#f6f7f9;
    --brand:#4f46e5; --brand-d:#4338ca; --brand-l:#eef2ff; --brand-l2:#e0e7ff;
    --radius:12px; --radius-s:8px;
    --font-ui:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--font-ui); color:var(--ink); background:var(--canvas); -webkit-font-smoothing:antialiased; line-height:1.5;}
  .wrap{max-width:1980px; margin:0 auto; padding:28px 32px 64px;}

  header{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:6px;}
  .brand{display:flex; align-items:center; gap:11px;}
  .brand .logo{font-family:"Poppins"; font-weight:700; font-size:19px; color:var(--brand); letter-spacing:-0.01em;}
  .brand .sep{width:1px; height:20px; background:var(--line);}
  .brand .name{font-size:14px; color:var(--ink-3); font-weight:500;}
  .sub{font-size:13.5px; color:var(--ink-3); margin:2px 0 24px;}

  .toolbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  button.tb{font-family:var(--font-ui); font-size:13px; font-weight:500; color:var(--ink-2); background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-s); padding:8px 13px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:border-color .14s, background .14s;}
  button.tb:hover{border-color:#d6d8e0; background:#fcfcfd;}
  button.tb .ic{width:15px; height:15px; stroke:currentColor; stroke-width:1.8; fill:none; stroke-linecap:round; stroke-linejoin:round;}
  .src{font-size:12.5px; color:var(--ink-4); margin-left:4px;}

  .grid{display:grid; grid-template-columns:minmax(0,1fr) 320px; gap:40px; align-items:start; margin-top:26px;}
  @media(max-width:1024px){ .grid{grid-template-columns:1fr;} .panel{position:static!important;} }

  /* device column */
  .stage{display:flex; flex-direction:column; align-items:center;}
  .seg{display:inline-flex; background:var(--surface); border:1px solid var(--line); border-radius:9999px; padding:3px; margin-bottom:12px;}
  .seg button{font-family:var(--font-ui); font-size:12.5px; font-weight:500; color:var(--ink-3); background:transparent; border:none; border-radius:9999px; padding:6px 16px; cursor:pointer; transition:all .15s;}
  .seg button.on{background:var(--brand); color:#fff;}
  .applies{font-size:12px; color:var(--ink-4); margin:0 0 20px; text-align:center;}

  .device{position:relative; background:#11131c; box-shadow:0 20px 50px -12px rgba(17,19,28,.32), 0 0 0 1px rgba(17,19,28,.04); transition:width .35s cubic-bezier(.4,0,.2,1), border-radius .35s, padding .35s; margin:0 auto;}
  .device .screen{position:relative; background:#fff; overflow:hidden;}
  .chrome{display:none;}
  .statusbar{display:flex; justify-content:space-between; align-items:center; padding:13px 26px 7px; font-size:11.5px;}
  .statusbar .time{font-weight:600; color:#1f2937;}
  .statusbar .dims{color:var(--brand); font-weight:600; font-variant-numeric:tabular-nums; background:var(--brand-l); padding:1px 8px; border-radius:9999px;}
  .notch{position:absolute; top:0; left:50%; transform:translateX(-50%); width:128px; height:26px; background:#11131c; border-radius:0 0 16px 16px; z-index:6;}
  .viewport{overflow-y:auto; scrollbar-width:thin;}
  .viewport::-webkit-scrollbar{width:5px} .viewport::-webkit-scrollbar-thumb{background:#d6d8e0; border-radius:9999px}

  /* Mobile phone frame */
  .device-mobile{width:340px; max-width:100%; border-radius:46px; padding:11px;}
  .device-mobile .screen{border-radius:36px;}
  .device-mobile .chrome-phone{display:block;}
  .device-mobile .viewport{height:560px;}

  /* Tablet frame */
  .device-tablet{width:560px; max-width:100%; border-radius:28px; padding:16px;}
  .device-tablet .screen{border-radius:14px;}
  .device-tablet .chrome-phone{display:block;}
  .device-tablet .chrome-phone .notch{display:none;}
  .device-tablet .viewport{height:600px;}

  /* Desktop browser frame */
  .device-desktop{width:100%; max-width:1536px; border-radius:12px 12px 10px 10px; padding:0; background:#e8e9ee;}
  .device-desktop .screen{border-radius:12px 12px 10px 10px;}
  .device-desktop .chrome-browser{display:flex; align-items:center; gap:12px; padding:10px 14px; background:#e8e9ee; border-bottom:1px solid #d6d8e0;}
  .device-desktop .dots{display:flex; gap:6px;}
  .device-desktop .dots span{width:11px; height:11px; border-radius:50%; background:#cfd2da;}
  .device-desktop .dots span:nth-child(1){background:#ff5f57;}
  .device-desktop .dots span:nth-child(2){background:#febc2e;}
  .device-desktop .dots span:nth-child(3){background:#28c840;}
  .device-desktop .urlbar{flex:1; background:#fff; border-radius:7px; padding:6px 12px; font-size:11.5px; color:var(--ink-3); text-align:center;}
  .device-desktop .viewport{height:600px;}
  .viewport::-webkit-scrollbar{width:5px} .viewport::-webkit-scrollbar-thumb{background:#d6d8e0; border-radius:9999px}

  /* panel column */
  .panel{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px 18px 16px; position:sticky; top:20px;}
  .panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:3px;}
  .panel-head h2{font-size:15px; font-weight:600; margin:0; letter-spacing:-0.01em;}
  .scope{font-size:11px; font-weight:600; color:#fff; background:var(--brand); border-radius:9999px; padding:3px 10px;}
  .panel-sub{font-size:12px; color:var(--ink-4); margin:0 0 14px;}

  .ctrl{padding:10px 0; border-bottom:1px solid var(--line-2);}
  .ctrl:last-of-type{border-bottom:none;}
  .ctrl-top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:7px;}
  .ctrl-name{font-size:13px; font-weight:500; color:var(--ink);}
  .ctrl-meta{font-size:11.5px; color:var(--ink-4); font-variant-numeric:tabular-nums;}
  .ctrl-meta b{color:var(--brand-d); font-weight:600;}
  input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:9999px; background:var(--line); outline:none; margin:0; cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:#fff; border:2px solid var(--brand); cursor:pointer; transition:transform .1s;}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.12);}
  input[type=range]::-moz-range-thumb{width:16px; height:16px; border-radius:50%; background:#fff; border:2px solid var(--brand); cursor:pointer;}
  .tags-toggle{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ink-2); margin-top:14px; padding-top:13px; border-top:1px solid var(--line-2); cursor:pointer; user-select:none;}
  .tags-toggle input{width:15px; height:15px; accent-color:var(--brand); margin:0;}

  .footer-bar{display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:24px; padding-top:22px; border-top:1px solid var(--line);}
  button.primary{font-family:var(--font-ui); font-size:13.5px; font-weight:600; color:#fff; background:var(--brand); border:none; border-radius:var(--radius-s); padding:11px 18px; cursor:pointer; display:inline-flex; align-items:center; gap:8px; transition:background .14s;}
  button.primary:hover{background:var(--brand-d);}
  button.primary .ic{width:16px; height:16px; stroke:#fff; stroke-width:1.9; fill:none; stroke-linecap:round; stroke-linejoin:round;}
  button.ghost{font-family:var(--font-ui); font-size:13px; font-weight:500; color:var(--ink-2); background:transparent; border:1px solid var(--line); border-radius:var(--radius-s); padding:11px 16px; cursor:pointer;}
  button.ghost:hover{border-color:#d6d8e0;}
  .status{font-size:13px; color:#0f9d58; font-weight:500;}

  .modal-back{position:fixed; inset:0; background:rgba(17,19,28,.4); display:none; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal{background:#fff; border-radius:var(--radius); width:min(640px,100%); padding:22px; box-shadow:0 24px 60px rgba(0,0,0,.25);}
  .modal h3{margin:0 0 4px; font-size:16px; font-weight:600;}
  .modal p{margin:0 0 14px; font-size:13px; color:var(--ink-3);}
  textarea{width:100%; min-height:200px; font-family:"SF Mono",Menlo,monospace; font-size:12px; border:1px solid var(--line); border-radius:var(--radius-s); padding:12px; resize:vertical; line-height:1.5; color:var(--ink-2);}
  .modal-actions{display:flex; gap:8px; justify-content:flex-end; margin-top:14px;}

  /* preview tokens */
  .pv-tag{display:inline-block; font-family:var(--font-ui); font-size:9px; line-height:1.4; font-weight:600; letter-spacing:.02em; color:var(--brand-d); background:var(--brand-l); border-radius:4px; padding:1px 6px; margin-bottom:4px;}
  .ptabs{display:flex; gap:2px; background:var(--canvas); border-radius:var(--radius-s); padding:3px; margin:10px 0 4px;}
  .ptabs button{flex:1; font-family:var(--font-ui); font-size:12px; font-weight:500; color:var(--ink-3); background:transparent; border:none; border-radius:6px; padding:7px 4px; cursor:pointer; transition:all .14s;}
  .ptabs button.on{background:#fff; color:var(--ink); box-shadow:0 1px 2px rgba(17,19,28,.06);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="logo">folloze</span>
      <span class="sep"></span>
      <span class="name">Mobile typography tuner</span>
    </div>
    <div class="toolbar">
      <button class="tb" id="btn-upload"><svg class="ic" viewBox="0 0 24 24"><path d="M12 16V4m0 0L8 8m4-4l4 4M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>Upload theme.css</button>
      <button class="tb" id="btn-paste"><svg class="ic" viewBox="0 0 24 24"><rect x="8" y="4" width="8" height="4" rx="1"/><path d="M8 6H6a2 2 0 00-2 2v11a2 2 0 002 2h12a2 2 0 002-2V8a2 2 0 00-2-2h-2"/></svg>Paste CSS</button>
      <button class="tb" id="btn-reset"><svg class="ic" viewBox="0 0 24 24"><path d="M3 12a9 9 0 109-9 9 9 0 00-7 3.3M3 4v4h4"/></svg>Reset</button>
      <span class="src" id="src-label">Using embedded theme</span>
    </div>
  </header>
  <input type="file" id="file-input" accept=".css,text/css" style="display:none">

  <div class="grid">

    <div class="stage">
      <div class="seg" id="bp-toggle">
        <button data-bp="640">Mobile</button>
        <button data-bp="1024">Tablet</button>
        <button data-bp="1536">Desktop</button>
      </div>
      <p class="applies" id="bp-applies"></p>

      <div class="device device-mobile" id="device">
        <div class="screen">
          <div class="chrome chrome-phone">
            <div class="notch"></div>
            <div class="statusbar"><span class="time">9:41</span><span class="dims" id="dev-w">390px</span></div>
          </div>
          <div class="chrome chrome-browser">
            <div class="dots"><span></span><span></span><span></span></div>
            <div class="urlbar"><span id="url-text">folloze.com</span></div>
          </div>
          <div class="viewport" id="preview"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2 id="panel-title">Font sizes</h2>
        <span class="scope" id="scope-pill">Mobile</span>
      </div>
      <div class="ptabs" id="prop-tabs">
        <button data-prop="font-size" class="on">Size</button>
        <button data-prop="line-height">Line height</button>
        <button data-prop="letter-spacing">Letter spacing</button>
      </div>
      <p class="panel-sub" id="panel-sub">Drag to scale each token at this breakpoint.</p>
      <div id="controls"></div>
      <label class="tags-toggle"><input type="checkbox" id="show-tags" checked> Show token labels on preview</label>
    </div>

  </div>

  <div class="footer-bar">
    <button class="primary" id="btn-download"><svg class="ic" viewBox="0 0 24 24"><path d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"/></svg>Download updated theme.css</button>
    <button class="ghost" id="btn-copy">Copy CSS</button>
    <span class="status" id="dl-status"></span>
  </div>

</div>

<div class="modal-back" id="paste-modal">
  <div class="modal">
    <h3>Paste your theme.css</h3>
    <p>Paste the full file. We read the three media queries and keep everything else exactly as-is.</p>
    <textarea id="paste-box" placeholder="Paste full theme.css here…"></textarea>
    <div class="modal-actions">
      <button class="ghost" id="btn-cancel-paste">Cancel</button>
      <button class="primary" id="btn-load-paste" style="padding:9px 16px;">Load CSS</button>
    </div>
  </div>
</div>

function emptyFactors(){
  const f={};
  BPS.forEach(bp=>{ f[bp]={}; ROWS.forEach(r=>{ f[bp][r.key]={"font-size":1,"line-height":1,"letter-spacing":1}; }); });
  return f;
}
function mqBody(text,startIdx){
  // find first "{" after startIdx, then return substring up to its matching close brace
  let i=text.indexOf("{",startIdx);
  if(i<0)return null;
  let depth=0;
  for(let j=i;j<text.length;j++){
    const ch=text[j];
    if(ch==="{")depth++;
    else if(ch==="}"){depth--; if(depth===0)return text.slice(i+1,j);}
  }
  return null;
}
let __lastParseCount=0;
function parseFactors(text){
  const f=emptyFactors();
  let found=0;
  // locate every @media ... (min|max)-width: Npx ... block, brace-balanced
  const headRe=/@media[^{]*?\((min|max)-width:\s*(\d+)px\)[^{]*/g;
  let m;
  while((m=headRe.exec(text))!==null){
    const w=m[2];let bp=null;
    if(m[1]==="min"&&w==="1536")bp="1536";
    else if(m[1]==="max"&&w==="1024")bp="1024";
    else if(m[1]==="max"&&w==="640")bp="640";
    if(!bp)continue;
    const body=mqBody(text,headRe.lastIndex);
    if(body===null)continue;
    ROWS.forEach(r=>{
      Object.keys(PROPS).forEach(prop=>{
        const mm=body.match(new RegExp("--fz-"+r.key+"-"+prop+"-factor\\s*:\\s*([0-9.]+)"));
        if(mm){f[bp][r.key][prop]=parseFloat(mm[1]);found++;}
      });
    });
  }
  __lastParseCount=found;
  return f;
}
function parseFamilies(text){
  const fam={};
  ROWS.forEach(r=>{
    fam[r.key]=r.fam;
    const mm=text.match(new RegExp("--fz-"+r.key+"-font-family:\\s*var\\(--fz-font-family-(\\d)\\)"));
    if(mm) fam[r.key]=parseInt(mm[1]);
  });
  return fam;
}

function fac(row,prop){return factors[currentBp][row.key][prop];}
function px(row){return row.base*fac(row,"font-size");}
function lineH(row){return Math.round(row.lh*fac(row,"line-height")*1000)/1000;}
function letterS(row){
  if(row.lsu==="normal") return "normal";
  return (row.ls*fac(row,"letter-spacing"))+"em";
}
function famOf(row){return famMap[row.key]||row.fam;}
function R(k){return ROWS.find(r=>r.key===k);}

function renderControls(){
  const P=PROPS[currentProp];
  $("panel-title").textContent=P.title;
  $("panel-sub").textContent=P.sub;
  $("scope-pill").textContent=BP_INFO[currentBp].pill;
  $("prop-tabs").querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.prop===currentProp));
  const c=$("controls");c.innerHTML="";
  ROWS.forEach(row=>{
    const val=fac(row,currentProp);
    const d=document.createElement("div");
    d.className="ctrl";
    d.innerHTML=
      '<div class="ctrl-top"><span class="ctrl-name">'+row.label+'</span>'+
      '<span class="ctrl-meta"><b id="f-'+row.key+'">'+P.fmt(val)+'</b> · <span id="p-'+row.key+'">'+metaText(row)+'</span></span></div>'+
      '<input type="range" min="'+P.min+'" max="'+P.max+'" step="'+P.step+'" value="'+val+'" id="s-'+row.key+'">';
    c.appendChild(d);
    d.querySelector("#s-"+row.key).addEventListener("input",function(){
      const v=parseFloat(this.value);
      factors[currentBp][row.key][currentProp]=v;
      $("f-"+row.key).textContent=P.fmt(v);
      $("p-"+row.key).textContent=metaText(row);
      syncPreview();
    });
  });
}
function metaText(row){
  if(currentProp==="font-size") return px(row).toFixed(0)+"px";
  if(currentProp==="line-height") return lineH(row).toFixed(2);
  return row.lsu==="normal" ? "normal" : (row.ls*fac(row,"letter-spacing")).toFixed(3)+"em";
}

function elText(token,txt,extra){
  const row=R(token);
  const wrap=document.createElement("div");
  const t=document.createElement("div");
  t.className="pv-tag"; t.dataset.tagFor=token;
  const d=document.createElement("div");
  d.className="pv-text"; d.dataset.token=token; d.textContent=txt;
  d.style.cssText="font-family:"+FAMS[famOf(row)]+",sans-serif;font-weight:"+row.w+";"+(extra||"");
  wrap.appendChild(t); wrap.appendChild(d);
  return wrap;
}

function syncPreview(){
  const showTags=$("show-tags").checked;
  ROWS.forEach(row=>{
    const size=px(row), lh=lineH(row), ls=letterS(row);
    previewNodes.filter(n=>n.dataset.token===row.key).forEach(el=>{
      el.style.fontSize=size+"px";
      el.style.lineHeight=lh;
      el.style.letterSpacing=ls;
    });
    document.querySelectorAll('.pv-tag[data-tag-for="'+row.key+'"]').forEach(t=>{
      t.style.display=showTags?"inline-block":"none";
      t.textContent=row.label+" · "+FAM_LABEL[famOf(row)]+" · "+activeTagMetric(row);
    });
  });
}
function activeTagMetric(row){
  if(currentProp==="line-height") return "lh "+lineH(row).toFixed(2);
  if(currentProp==="letter-spacing") return "ls "+(row.lsu==="normal"?"normal":(row.ls*fac(row,"letter-spacing")).toFixed(3)+"em");
  return px(row).toFixed(0)+"px";
}
function renderPreview(){ buildPreview(); }

function setProp(prop){ currentProp=prop; renderControls(); syncPreview(); }

function setBp(bp){
  currentBp=bp;
  const info=BP_INFO[bp];
  $("bp-applies").textContent=info.applies;
  $("dev-w").textContent=info.w;
  const urlEl=$("url-text"); if(urlEl)urlEl.textContent=info.url;
  const dev=$("device");
  if(dev){ dev.className="device "+info.frame; }
  $("bp-toggle").querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.bp===bp));
  renderControls();buildPreview();
}

function buildOutput(){
  let out=cssText;
  // Replace factor values inside each matched media block, brace-aware, leaving everything else byte-identical.
  const headRe=/@media[^{]*?\((min|max)-width:\s*(\d+)px\)[^{]*/g;
  let m; const edits=[];
  while((m=headRe.exec(out))!==null){
    const w=m[2];let bp=null;
    if(m[1]==="min"&&w==="1536")bp="1536";
    else if(m[1]==="max"&&w==="1024")bp="1024";
    else if(m[1]==="max"&&w==="640")bp="640";
    if(!bp)continue;
    // find body span (between matching braces)
    let i=out.indexOf("{",headRe.lastIndex); if(i<0)continue;
    let depth=0,bodyStart=i+1,bodyEnd=-1;
    for(let j=i;j<out.length;j++){const ch=out[j];if(ch==="{")depth++;else if(ch==="}"){depth--;if(depth===0){bodyEnd=j;break;}}}
    if(bodyEnd<0)continue;
    edits.push({bp,start:bodyStart,end:bodyEnd});
  }
  // apply from last to first so indices stay valid
  edits.sort((a,b)=>b.start-a.start).forEach(e=>{
    let body=out.slice(e.start,e.end);
    ROWS.forEach(row=>{
      Object.keys(PROPS).forEach(prop=>{
        body=body.replace(new RegExp("(--fz-"+row.key+"-"+prop+"-factor\\s*:\\s*)([0-9.]+)"),"$1"+factors[e.bp][row.key][prop]);
      });
    });
    out=out.slice(0,e.start)+body+out.slice(e.end);
  });
  return out;
}

function loadCss(text,label){
  cssText=text;
  factors=parseFactors(text);
  famMap=parseFamilies(text);
  const lbl=$("src-label");
  if(__lastParseCount===0 && text!==EMBEDDED){
    lbl.textContent=label+" — ⚠ no font factors found in this file";
    lbl.style.color="#b45309";
  }else{
    lbl.textContent=label+(text!==EMBEDDED?" ("+__lastParseCount+" factors read)":"");
    lbl.style.color="var(--ink-4)";
  }
  setBp(currentBp);
}

$("btn-download").addEventListener("click",()=>{
  const blob=new Blob([buildOutput()],{type:"text/css"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="theme.css";
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  flash("Downloaded — only the factors you changed are touched");
});

  try{await navigator.clipboard.writeText(buildOutput());flash("Copied full theme.css to clipboard");}

});
function flash(msg){$("dl-status").textContent="✓ "+msg;setTimeout(()=>$("dl-status").textContent="",4000);}

}
}
